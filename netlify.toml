[build]
command = "npm run build"
publish = "dist"

[[redirects]]
from = "/api/*"
to = "https://sofia-voice.onrender.com/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[edge_functions]]
path = "/.netlify/edge-functions/supabase-proxy"
function = "supabase-proxy"
