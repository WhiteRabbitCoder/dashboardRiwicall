<div class="p-6 space-y-6 animate-in">
    <div class="flex flex-wrap items-center gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
        <div class="relative flex-1 min-w-[300px]">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
            <input type="text" id="searchInput" placeholder="Buscar por nombre, documento, correo o telefono..."
                class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all">
        </div>

        <div class="relative">
            <select id="filtroEstado" class="appearance-none pl-4 pr-10 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-medium text-slate-600 focus:outline-none hover:bg-slate-50 cursor-pointer transition-all">
                <option value="Todos">Estado: Todos</option>
            </select>
            <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
        </div>

        <div class="relative">
            <select id="filtroMotivo" class="appearance-none pl-4 pr-10 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-medium text-slate-600 focus:outline-none hover:bg-slate-50 cursor-pointer transition-all">
                <option value="Todos">Motivo: Todos</option>
            </select>
            <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
        </div>

        <div class="relative">
            <select id="filtroEvento" class="appearance-none pl-4 pr-10 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-medium text-slate-600 focus:outline-none hover:bg-slate-50 cursor-pointer transition-all">
                <option value="Todos">Evento: Todos</option>
                <option value="SIN_EVENTO">Sin evento</option>
            </select>
            <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
        </div>

        <button id="btnLlamarTodos" class="flex items-center gap-2 px-6 py-3 bg-riwi-mint text-white rounded-2xl font-bold hover:opacity-90 transition-all shadow-lg shadow-emerald-100">
            <i data-lucide="phone-call" class="w-5 h-5"></i> Llamar a Todos
        </button>

        <button id="btnNuevoCandidato" class="flex items-center gap-2 px-6 py-3 bg-[#6366f1] text-white rounded-2xl font-bold hover:bg-[#4f46e5] transition-all shadow-lg shadow-indigo-100">
            <i data-lucide="plus" class="w-5 h-5"></i> Nuevo Candidato
        </button>
    </div>

    <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full border-collapse min-w-[1100px]">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-100">
                        <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase text-left">Nombre</th>
                        <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase text-left">Tipo documento</th>
                        <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase text-left">Documento</th>
                        <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase text-left">Edad</th>
                        <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase text-left">Telefono</th>
                        <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase text-left">Motivo llamada</th>
                        <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase text-left">Estado gestion</th>
                        <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase text-left">Evento asignado</th>
                        <th class="px-6 py-4 text-[11px] font-bold text-slate-500 uppercase text-left text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalRegistro" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-[2rem] p-8 w-full max-w-6xl max-h-[92vh] overflow-y-auto shadow-2xl relative animate-in zoom-in duration-200">
        <button id="btnCerrarX" class="absolute right-8 top-8 text-slate-400 hover:text-slate-600">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>

        <h2 class="text-2xl font-bold mb-8 text-[#1e293b]">Nuevo Candidato</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-5">
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Nombre</label>
                <input type="text" id="regNombre" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/10">
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Apellido</label>
                <input type="text" id="regApellido" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/10">
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Correo</label>
                <input type="email" id="regCorreo" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/10">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Hash contrasena</label>
                <input type="text" id="regContrasenaHash" value="hash_prueba_ui" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none">
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Telefono</label>
                <input type="text" id="regTelefono" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none">
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Codigo pais</label>
                <input type="text" id="regPaisCodigo" value="+57" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Fecha nacimiento</label>
                <input type="date" id="regFechaNacimiento" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none">
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Tipo documento</label>
                <select id="regTipoDocumento" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Numero documento</label>
                <input type="text" id="regNumeroDocumento" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Genero</label>
                <select id="regGenero" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Tipo convenio</label>
                <select id="regTipoConvenio" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Departamento</label>
                <select id="regDepartamento" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Municipio</label>
                <select id="regMunicipio" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Sede interes</label>
                <select id="regSedeInteres" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Estrato</label>
                <select id="regEstrato" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Horario</label>
                <select id="regHorario" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Medio comunicacion</label>
                <select id="regMedioComunicacion" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Nivel educativo</label>
                <select id="regNivelEducativo" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Titulo</label>
                <input type="text" id="regTitulo" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none">
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Conocimiento programacion</label>
                <select id="regConocimientoProgramacion" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Ocupacion</label>
                <select id="regOcupacion" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Motivo llamada</label>
                <select id="regMotivoLlamada" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Estado gestion</label>
                <select id="regEstadoGestion" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Evento asignado</label>
                <select id="regEventoAsignado" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none"></select>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Fase actual</label>
                <select id="regFaseActual" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none">
                    <option value="PRUEBA_LOGICA">PRUEBA_LOGICA</option>
                    <option value="ENTREVISTA">ENTREVISTA</option>
                    <option value="BIENVENIDA">BIENVENIDA</option>
                    <option value="FINALIZADO">FINALIZADO</option>
                </select>
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Discord usuario</label>
                <input type="text" id="regDiscordUsuario" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none">
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Form name</label>
                <input type="text" id="regFormName" value="Form Coders Test" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-500 ml-1">Form id</label>
                <input type="text" id="regFormId" class="w-full p-3.5 bg-white border border-slate-200 rounded-2xl outline-none" placeholder="TEST001">
            </div>
        </div>

        <div class="flex gap-4 mt-8">
            <button id="btnGuardar" class="flex-1 py-4 bg-[#6366f1] text-white rounded-2xl font-bold text-lg hover:bg-[#4f46e5] shadow-lg shadow-indigo-100 transition-all">Crear Candidato</button>
            <button id="btnCancelar" class="px-10 py-4 bg-white border border-slate-200 text-slate-500 rounded-2xl font-bold hover:bg-slate-50">Cancelar</button>
        </div>
    </div>
</div>
